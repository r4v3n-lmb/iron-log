name: Firebase Emulator CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install functions dependencies
        run: npm ci
        working-directory: functions

      - name: Build web bundle
        run: npm run build

      - name: Validate functions syntax
        run: npm run lint
        working-directory: functions

      - name: Emulator smoke test
        run: npm run test:emulators
