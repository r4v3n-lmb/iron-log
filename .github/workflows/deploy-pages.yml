name: Deploy Iron Log to Firebase Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

concurrency:
  group: "firebase-hosting-live"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build PWA site
        run: npm run build

      - name: Install Functions dependencies
        run: npm --prefix functions install --no-audit --no-fund

      - name: Write Firebase service account key
        run: |
          cat > "$RUNNER_TEMP/firebase-sa.json" <<'JSON'
          ${{ secrets.FIREBASE_SERVICE_ACCOUNT_IRONLOG_V1 }}
          JSON

      - name: Deploy to Firebase (Hosting + Functions)
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
        run: npx firebase deploy --project ironlog-v1 --only hosting:ironlog-v1,functions
