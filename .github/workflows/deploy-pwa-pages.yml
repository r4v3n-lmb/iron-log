name: Deploy PWA Branch to GitHub Pages

on:
  workflow_dispatch:
    inputs:
      confirm_live_deploy:
        description: "Type DEPLOY_PWA to publish pwa_main/dist to the live GitHub Pages URL"
        required: true
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-pwa"
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event.inputs.confirm_live_deploy == 'DEPLOY_PWA' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pwa_main
        uses: actions/checkout@v4
        with:
          ref: pwa_main

      - name: Prepare PWA site files
        run: |
          test -d dist
          test -f dist/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
